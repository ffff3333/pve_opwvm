name: Generate Final Config

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

    - name: Clone ImmortalWrt Source
      run: |
        git clone https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Create Base Config
      run: |
        cd immortalwrt
        rm -f .config

    - name: Write Base Config (heredoc)
      run: |
        cat > immortalwrt/.config << "EOF"
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y
EOF

    - name: Defconfig
      run: |
        cd immortalwrt
        make defconfig

    - name: Apply Unified Config Fragment (heredoc)
      run: |
        cat >> immortalwrt/.config << "EOF"

# ===========================
# 统一版 CONFIG 片段开始
# ===========================

# RootFS
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_PARTSIZE=1024
CONFIG_TARGET_KERNEL_PARTSIZE=256

# 内核 6.6
CONFIG_LINUX_6_6=y

# firewall4 + nftables
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y
CONFIG_PACKAGE_kmod-nft-core=y
CONFIG_PACKAGE_kmod-nft-nat=y
CONFIG_PACKAGE_kmod-nft-socket=y
CONFIG_PACKAGE_kmod-nft-tproxy=y
CONFIG_PACKAGE_kmod-nft-fib=y
CONFIG_PACKAGE_kmod-nft-chain-nat=y
CONFIG_PACKAGE_kmod-nft-offload=y
CONFIG_PACKAGE_kmod-nft-flow-offload=y
CONFIG_PACKAGE_kmod-nft-rpfilter=y
CONFIG_PACKAGE_kmod-nft-limit=y

# dnsmasq-full（nftset）
CONFIG_PACKAGE_dnsmasq-full=y
CONFIG_PACKAGE_dnsmasq_full_dhcp=y
CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
CONFIG_PACKAGE_dnsmasq_full_dnssec=y
CONFIG_PACKAGE_dnsmasq_full_auth=y
CONFIG_PACKAGE_dnsmasq_full_ipset=n
CONFIG_PACKAGE_dnsmasq_full_nftset=y
CONFIG_PACKAGE_dnsmasq_full_tftp=y

# adblock-fast
CONFIG_PACKAGE_adblock-fast=y
CONFIG_PACKAGE_luci-app-adblock-fast=y
CONFIG_PACKAGE_luci-i18n-adblock-fast-zh-cn=y
CONFIG_ADBLOCK_FAST_CHNROUTE=y
CONFIG_ADBLOCK_FAST_ALL_RULES=y
CONFIG_ADBLOCK_FAST_NO_SMARTDNS=y

# 代理全家桶
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Libev_Client=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy=y
CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y

CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_sing-box=y
CONFIG_PACKAGE_xray-core=y
CONFIG_PACKAGE_trojan-go=y
CONFIG_PACKAGE_trojan-plus=y
CONFIG_PACKAGE_shadowsocks-libev-ss-local=y
CONFIG_PACKAGE_shadowsocks-libev-ss-redir=y
CONFIG_PACKAGE_shadowsocks-rust-sslocal=y
CONFIG_PACKAGE_shadowsocksr-libev-ssr-local=y

# LuCI + Argon
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y

# 网卡驱动（物理 + 虚拟机）
CONFIG_PACKAGE_kmod-igc=y
CONFIG_PACKAGE_kmod-igb=y
CONFIG_PACKAGE_kmod-e1000e=y
CONFIG_PACKAGE_kmod-e1000=y
CONFIG_PACKAGE_kmod-r8169=y
CONFIG_PACKAGE_kmod-r8125=y
CONFIG_PACKAGE_kmod-virtio-net=y
CONFIG_PACKAGE_kmod-vmxnet3=y
CONFIG_PACKAGE_kmod-usb-net=y
CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
CONFIG_PACKAGE_kmod-usb-net-rtl8150=y

# 虚拟机磁盘格式
CONFIG_QCOW2_IMAGES=y
CONFIG_VMDK_IMAGES=y
CONFIG_VHDX_IMAGES=y
CONFIG_VDI_IMAGES=y
CONFIG_ISO_IMAGES=y

# 内核安全
CONFIG_KERNEL_CC_STACKPROTECTOR_STRONG=y
CONFIG_KERNEL_RANDOMIZE_BASE=y
CONFIG_KERNEL_HARDENED_USERCOPY=y
CONFIG_KERNEL_REFCOUNT_FULL=y
# CONFIG_KERNEL_KALLSYMS is not set
# CONFIG_KERNEL_DEBUG_FS is not set

# SSH 安全
CONFIG_DROPBEAR_DISABLE_ROOT_LOGIN=y
CONFIG_DROPBEAR_DISABLE_PASSWORD_AUTH=y
CONFIG_DROPBEAR_ENABLE_PUBKEY_AUTH=y

# BusyBox 安全
CONFIG_BUSYBOX_CONFIG_FEATURE_SHADOWPASSWDS=y
CONFIG_BUSYBOX_CONFIG_FEATURE_SECURETTY=y

# 网络安全
CONFIG_KERNEL_SYN_COOKIES=y
CONFIG_PACKAGE_kmod-tcp-bbr=y

# 虚拟机安全
CONFIG_PACKAGE_kmod-virtio-rng=y
CONFIG_KERNEL_HYPERVISOR_GUEST=y

# 禁用 iptables / banIP / firewall3
# CONFIG_PACKAGE_firewall is not set
# CONFIG_PACKAGE_banip is not set
# CONFIG_PACKAGE_luci-app-banip is not set
# CONFIG_PACKAGE_iptables is not set
# CONFIG_PACKAGE_ip6tables is not set

# ===========================
# 统一版 CONFIG 片段结束
# ===========================

EOF

    - name: Finalize Config
      run: |
        cd immortalwrt
        make defconfig
        echo "最终 .config 已生成：immortalwrt/.config"

    - name: Upload .config
      uses: actions/upload-artifact@v3
      with:
        name: final-config
        path: immortalwrt/.config
