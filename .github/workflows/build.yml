name: Build ImmortalWrt Advanced (TPROXY + CN Split + Cache)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ 编译缓存（核心加速）
    - name: Cache Toolchain & DL
      uses: actions/cache@v4
      with:
        path: |
          immortalwrt/dl
          immortalwrt/staging_dir
          immortalwrt/build_dir
        key: immortalwrt-${{ runner.os }}-${{ hashFiles('**/.config') }}
        restore-keys: |
          immortalwrt-${{ runner.os }}

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone ImmortalWrt
      run: |
        git clone -b openwrt-23.05 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt

        # Passwall + OpenClash
        echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages" >> feeds.conf.default
        echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall" >> feeds.conf.default
        echo "src-git openclash https://github.com/vernesong/OpenClash" >> feeds.conf.default

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Write Advanced .config
      run: |
        cat > immortalwrt/.config << "EOF"
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y

# RootFS
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_PARTSIZE=1024

# firewall4 + TPROXY（核心）
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y
CONFIG_PACKAGE_kmod-nft-core=y
CONFIG_PACKAGE_kmod-nft-nat=y
CONFIG_PACKAGE_kmod-nft-tproxy=y
CONFIG_PACKAGE_kmod-nft-socket=y
CONFIG_PACKAGE_kmod-nft-fib=y
CONFIG_PACKAGE_kmod-nft-offload=y
CONFIG_PACKAGE_kmod-nft-flow-offload=y

# dnsmasq（nftset → 分流关键）
CONFIG_PACKAGE_dnsmasq-full=y
CONFIG_PACKAGE_dnsmasq_full_nftset=y

# Passwall（TPROXY 模式）
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy=y
CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y

# OpenClash
CONFIG_PACKAGE_luci-app-openclash=y

# 核心代理
CONFIG_PACKAGE_sing-box=y
CONFIG_PACKAGE_xray-core=y

# Geo 数据（CN 分流关键）
CONFIG_PACKAGE_v2ray-geoip=y
CONFIG_PACKAGE_v2ray-geosite=y

# LuCI
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-theme-argon=y

# 驱动
CONFIG_PACKAGE_kmod-e1000=y
CONFIG_PACKAGE_kmod-e1000e=y
CONFIG_PACKAGE_kmod-virtio-net=y

# 虚拟机镜像
CONFIG_QCOW2_IMAGES=y
CONFIG_VMDK_IMAGES=y

# BBR
CONFIG_PACKAGE_kmod-tcp-bbr=y

# SSH 安全（可登录）
# CONFIG_DROPBEAR_DISABLE_ROOT_LOGIN is not set

EOF

    - name: Add OpenClash Core (mihomo)
      run: |
        CORE_DIR="immortalwrt/package/luci-app-openclash/root/etc/openclash/core"
        mkdir -p $CORE_DIR
        wget -qO $CORE_DIR/clash_meta https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64
        chmod +x $CORE_DIR/clash_meta

    - name: Defconfig
      run: |
        cd immortalwrt
        make defconfig

    - name: Download Sources
      run: |
        cd immortalwrt
        make download -j$(nproc)

    - name: Build Firmware
      run: |
        cd immortalwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-advanced
        path: immortalwrt/bin/targets/x86/64/
